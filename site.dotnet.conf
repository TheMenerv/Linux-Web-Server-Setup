# ============================================================
# Configuration Nginx pour {domain} avec HTTPS
# Description : Ce fichier configure un serveur Nginx pour 
# servir {domain} en HTTPS avec PHP-FPM, journalisation, 
# protection par mot de passe et certificat Let's Encrypt.
# ============================================================

server {
    # ----------------------------
    # Redirection HTTP vers HTTPS
    # ----------------------------
    # Port HTTP
    listen 80;
    # Nom de domaine
    server_name {name};
    # Redirige tout le trafic vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    # ----------------------------
    # Paramètres HTTPS
    # ----------------------------
    # Écoute en HTTPS avec HTTP/2
    listen 443 ssl http2;
    # Nom de domaine
    server_name {name};

    # Chemin du certificat Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/{name}/fullchain.pem;
    # Chemin de la clé privée
    ssl_certificate_key /etc/letsencrypt/live/{name}/privkey.pem;

    # Protocoles TLS autorisés
    ssl_protocols TLSv1.2 TLSv1.3;
    # Ciphers sécurisés
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    # Priorité au serveur pour les ciphers
    ssl_prefer_server_ciphers on;
    # Cache des sessions SSL
    ssl_session_cache shared:SSL:10m;

    # ----------------------------
    # Répertoire racine et page d'index
    # ----------------------------
    # Répertoire racine des fichiers du site
    root /var/www/{name}/httpdocs;

    # ----------------------------
    # Gestion des URL
    # ----------------------------
    location / {
        # Passer les requêtes à l'application .NET Core
        proxy_pass         http://localhost:{internal_port};
        # Utilise HTTP/1.1 pour le proxy
        proxy_http_version 1.1;
        # Gère les mises à niveau de protocole
        proxy_set_header   Upgrade $http_upgrade;
        # Garde la connexion vivante
        proxy_set_header   Connection keep-alive;
        # Définit l'en-tête Host
        proxy_set_header   Host $host;
        # Bypass du cache pour les mises à niveau
        proxy_cache_bypass $http_upgrade;
        # Ajoute l'adresse IP du client
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Définit le protocole d'origine
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------
    # Journaux
    # ----------------------------
    # Journal des accès
    access_log /var/www/{name}/logs/access.log;
    # Journal des erreurs
    error_log  /var/www/{name}/logs/error.log;

    # ----------------------------
    # Sécurisation par mot de passe
    # ----------------------------
    # Message affiché lors de l'invite de mot de passe
    # auth_basic "Restricted Access";
    # Fichier contenant les utilisateurs et mots de passe
    # auth_basic_user_file /var/www/{name}/.htpasswd;

    # ----------------------------
    # Sécurité supplémentaire
    # ----------------------------
    # Masque la version de Nginx
    server_tokens off;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
}
