# ============================================================
# Fichier de configuration vsftpd : /etc/vsftpd.conf
# Description : Configuration complète de vsftpd pour un serveur FTP sécurisé.
# Ce fichier organise les options par thèmes : écoute, utilisateurs,
# permissions, chroot, journalisation et SSL.
# ============================================================

# ----------------------------
# Mode d'écoute
# ----------------------------
# Démarre vsftpd en tant que démon autonome
listen=YES

# Désactive l'écoute IPv6
listen_ipv6=NO

# ----------------------------
# Authentification et utilisateurs
# ----------------------------
# Interdit les connexions anonymes
anonymous_enable=NO

# Autorise les utilisateurs locaux du système
local_enable=YES

# Autorise les commandes FTP qui modifient les fichiers
write_enable=YES

# Liste d'utilisateurs autorisés ou interdits
userlist_enable=YES
userlist_file=/etc/vsftpd.userlist
# Les utilisateurs de la liste sont autorisés (non interdits)
userlist_deny=NO

# ----------------------------
# Chroot et sécurité des utilisateurs
# ----------------------------
# Restreint les utilisateurs à leur répertoire personnel
chroot_local_user=YES

# Permet aux répertoires chrootés d'être inscriptibles si nécessaire
allow_writeable_chroot=YES

# Répertoire sécurisé pour le chroot interne de vsftpd
secure_chroot_dir=/var/run/vsftpd/empty

# ----------------------------
# Journalisation
# ----------------------------
# Active l'affichage de messages dans les répertoires
dirmessage_enable=YES

# Utilise l'heure locale pour les fichiers listés
use_localtime=YES

# Active la journalisation des transferts
xferlog_enable=YES

# Les transferts en mode PORT doivent provenir du port 20
connect_from_port_20=YES

# ----------------------------
# SSL / chiffrement
# ----------------------------
# Active SSL pour sécuriser les connexions
ssl_enable=YES

# Chemin vers le certificat SSL et la clé privée
rsa_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
rsa_private_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

# Autorise uniquement TLS 1.0 et supérieurs
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO

# Ne pas exiger la réutilisation de session SSL
require_ssl_reuse=NO

# Chiffres utilisés pour SSL
ssl_ciphers=HIGH

# Forcer le SSL pour les transferts et les connexions locales
force_local_data_ssl=YES
force_local_logins_ssl=YES

# Interdire les connexions anonymes SSL
allow_anon_ssl=NO

# ----------------------------
# Configuration passive FTP
# ----------------------------
pasv_min_port=40000
pasv_max_port=50000

# ----------------------------
# PAM et authentification
# ----------------------------
pam_service_name=ftp
